<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0F1419">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ledger">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>Ledger</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

:root{
  --bg:#0F1419;
  --surface:#161C25;
  --surface-2:#1C2430;
  --border:#2A323F;
  --ink:#ECE9E2;
  --muted:#8A94A6;
  --green:#6FCF97;
  --red:#E0785B;
  --amber:#E0A458;
  --blue:#7FB3D5;
  --purple:#C68FE6;
  --font-display:'Space Grotesk', sans-serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
body{
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font-family:var(--font-body);
  min-height:100vh;
}
button{touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
#app{
  max-width:920px;
  margin:0 auto;
  padding:40px 24px 80px;
}
.eyebrow{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--muted);
  margin:0 0 4px;
}
h1{
  font-family:var(--font-display);
  font-weight:700;
  font-size:28px;
  margin:0 0 28px;
  letter-spacing:-0.01em;
}
.month-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.month-nav{
  display:flex;
  align-items:center;
  gap:12px;
}
.month-nav button{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--ink);
  width:32px;height:32px;
  border-radius:6px;
  cursor:pointer;
  font-size:14px;
  font-family:var(--font-mono);
}
.month-nav button:hover{border-color:var(--muted);}
.month-label{
  font-family:var(--font-display);
  font-weight:700;
  font-size:16px;
  min-width:140px;
  text-align:center;
}
.income-field{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--font-mono);
  font-size:13px;
  color:var(--muted);
}
.income-field input{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--ink);
  font-family:var(--font-mono);
  font-size:14px;
  padding:6px 10px;
  border-radius:6px;
  width:120px;
  min-width:0;
}
.income-field button, .import-label{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--muted);
  width:30px;height:30px;
  border-radius:6px;
  cursor:pointer;
  font-family:var(--font-mono);
  font-size:14px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.income-field button:hover, .import-label:hover{color:var(--ink);border-color:var(--muted);}
.hero{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:28px 28px 24px;
  margin-bottom:20px;
}
.hero-label{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
}
.hero-amount{
  font-family:var(--font-display);
  font-size:48px;
  font-weight:700;
  line-height:1.05;
  margin-bottom:14px;
  overflow-wrap:anywhere;
}
.hero-amount.pos{color:var(--green);}
.hero-amount.neg{color:var(--red);}
.equation{
  font-family:var(--font-mono);
  font-size:13px;
  color:var(--muted);
  border-top:1px solid var(--border);
  padding-top:14px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  align-items:baseline;
}
.equation .num{color:var(--ink);}
.equation .op{color:var(--muted);}

.stats-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-bottom:20px;
}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:18px 20px;
  min-width:0;
}
.stat-amount{
  font-family:var(--font-mono);
  font-size:24px;
  font-weight:700;
  overflow-wrap:anywhere;
}
.stat-sub{
  font-size:11px;
  color:var(--muted);
  margin-top:6px;
  overflow-wrap:anywhere;
}

.bars-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:24px 28px;
  margin-bottom:20px;
}
.bars-title{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:14px;
}
.stack{
  display:flex;
  height:14px;
  border-radius:7px;
  overflow:hidden;
  background:var(--surface-2);
  margin-bottom:18px;
}
.stack div{height:100%;}
.cat-list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px 24px;
}
.cat-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  font-size:14px;
  padding:6px 0;
  border-bottom:1px solid var(--border);
  min-width:0;
}
.cat-name{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.cat-val{text-align:right;min-width:0;}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.cat-amt{font-family:var(--font-mono);font-size:14px;color:var(--ink);}
.cat-pct{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-left:8px;}

.form-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 24px;
  margin-bottom:20px;
}
.form-title{
  font-family:var(--font-mono);
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:14px;
}
form{
  display:grid;
  grid-template-columns:repeat(4, minmax(0,1fr));
  gap:12px;
}
.field{
  display:flex;
  flex-direction:column;
  gap:5px;
  min-width:0;
  position:relative;
}
.field > label{
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
}
.span2{grid-column:span 2;}
form input, form select{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:13px;
  padding:9px 10px;
  border-radius:6px;
  width:100%;
  min-width:0;
  min-height:38px;
}
form input:focus, form select:focus{outline:1px solid var(--blue);border-color:var(--blue);}
/* iOS Safari gives date inputs an intrinsic width that overflows the grid
   cell unless the native appearance is stripped. */
form input[type="date"]{
  -webkit-appearance:none;
  appearance:none;
}
form input[type="date"]::-webkit-date-and-time-value{
  text-align:left;
}
.freq-wrap{display:flex;gap:8px;}
.freq-wrap input{flex:0 0 64px;width:64px;}
.freq-wrap select{flex:1;min-width:0;}
.form-actions{
  grid-column:1 / -1;
  display:flex;
  gap:10px;
  justify-content:flex-end;
}
form button{
  background:var(--green);
  color:#0F1419;
  border:none;
  font-family:var(--font-display);
  font-weight:700;
  font-size:13px;
  border-radius:6px;
  cursor:pointer;
  padding:10px 20px;
}
form button:hover{opacity:0.9;}
form button.ghost{
  background:var(--surface-2);
  color:var(--muted);
  border:1px solid var(--border);
  font-family:var(--font-body);
  font-weight:500;
}
form button.ghost:hover{color:var(--ink);border-color:var(--muted);opacity:1;}
.acct-menu{
  position:absolute;
  top:100%;
  left:0;right:0;
  margin-top:4px;
  background:var(--surface-2);
  border:1px solid var(--border);
  border-radius:8px;
  max-height:190px;
  overflow-y:auto;
  z-index:20;
  box-shadow:0 10px 28px rgba(0,0,0,0.45);
  display:none;
}
.acct-menu.open{display:block;}
.acct-item{
  padding:11px 12px;
  font-size:14px;
  cursor:pointer;
  overflow-wrap:anywhere;
  border-bottom:1px solid var(--border);
}
.acct-item:last-child{border-bottom:none;}
.acct-item:hover, .acct-item:active{background:var(--surface);}

.table-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 24px;
  margin-bottom:20px;
}
.tx-head, .tx-row{
  display:grid;
  grid-template-columns:96px 122px minmax(0,1fr) minmax(0,1.1fr) 104px 62px;
  gap:10px;
  align-items:start;
  padding:9px 0;
  border-bottom:1px solid var(--border);
}
.tx-head{
  font-family:var(--font-mono);
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
  padding:2px 0 8px;
}
.tx-head .r{text-align:right;}
.tx-date{font-family:var(--font-mono);font-size:12px;color:var(--muted);padding-top:2px;}
.tx-cat{display:flex;align-items:center;gap:7px;font-size:13px;min-width:0;}
.tx-note{font-size:13px;overflow-wrap:anywhere;min-width:0;}
.tx-acct{font-size:13px;color:var(--muted);overflow-wrap:anywhere;min-width:0;}
.tx-amt{font-family:var(--font-mono);font-size:13px;text-align:right;min-width:0;overflow-wrap:anywhere;}
.tx-freq{display:block;font-size:10px;color:var(--muted);margin-top:1px;}
.tx-actions{display:flex;justify-content:flex-end;gap:2px;}
.tx-actions button{
  background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:15px;
  padding:2px 7px;border-radius:6px;line-height:1.3;
}
.tx-actions button:hover{color:var(--ink);background:var(--surface-2);}
.tx-actions button[data-del]:hover{color:var(--red);}
.empty{
  color:var(--muted);
  font-size:13px;
  text-align:center;
  padding:24px 0;
}
.account-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:20px 24px;
}
.account-row{
  display:flex;
  justify-content:space-between;
  align-items:baseline;
  gap:14px;
  font-size:13px;
  padding:7px 0;
  border-bottom:1px solid var(--border);
}
.account-row span:first-child{color:var(--muted);min-width:0;overflow-wrap:anywhere;}
.account-row span:last-child{font-family:var(--font-mono);white-space:nowrap;}

@media (max-width:640px){
  #app{
    padding-top:calc(20px + env(safe-area-inset-top, 0px));
    padding-left:max(16px, env(safe-area-inset-left, 0px));
    padding-right:max(16px, env(safe-area-inset-right, 0px));
    padding-bottom:calc(56px + env(safe-area-inset-bottom, 0px));
  }
  h1{font-size:24px;margin-bottom:20px;}
  .month-row{flex-direction:column;align-items:stretch;gap:12px;}
  .month-nav{justify-content:space-between;}
  .month-nav button{width:42px;height:42px;font-size:16px;}
  .income-field{width:100%;font-size:11px;}
  .income-field input{flex:1;font-size:16px;padding:9px 10px;}
  .income-field button, .import-label{width:40px;height:40px;font-size:15px;}
  .hero{padding:22px 20px 18px;}
  .hero-amount{font-size:34px;}
  .stats-row{gap:10px;}
  .stat{padding:14px 14px;}
  .stat-amount{font-size:19px;}
  .bars-card, .form-card, .table-card, .account-card{padding:18px 16px;}
  .cat-list{grid-template-columns:1fr;}
  .cat-pct{display:block;margin-left:0;}
  form{grid-template-columns:repeat(2, minmax(0,1fr));}
  form input, form select{font-size:16px;padding:11px 12px;min-height:46px;}
  .freq-wrap input{flex:0 0 70px;width:70px;}
  .form-actions{flex-direction:row;}
  .form-actions button{flex:1;min-height:48px;font-size:15px;}
  .tx-head{display:none;}
  .tx-row{
    grid-template-columns:auto minmax(0,1fr) auto;
    grid-template-areas:
      "note note amt"
      "acct acct amt"
      "cat  date actions";
    gap:3px 10px;
    align-items:center;
    padding:12px 0;
  }
  .tx-note{grid-area:note;font-weight:600;font-size:14px;color:var(--ink);}
  .tx-note:empty{display:none;}
  .tx-acct{grid-area:acct;font-size:12px;}
  .tx-acct:empty{display:none;}
  .tx-amt{grid-area:amt;font-size:14px;align-self:start;}
  .tx-cat{grid-area:cat;font-size:12px;color:var(--muted);}
  .tx-date{grid-area:date;font-size:11px;padding-top:0;}
  .tx-actions{grid-area:actions;}
  .tx-actions button{font-size:17px;padding:6px 10px;}
}
@media (prefers-reduced-motion: reduce){
  *{transition:none !important;}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
const CATEGORIES = [
  {id:'bills', label:'Bills', color:'var(--amber)'},
  {id:'subscriptions', label:'Subscriptions', color:'var(--blue)'},
  {id:'essentials', label:'Essentials', color:'var(--green)'},
  {id:'discretionary', label:'Discretionary', color:'var(--purple)'}
];
const CAT_COLOR = {bills:'#E0A458', subscriptions:'#7FB3D5', essentials:'#6FCF97', discretionary:'#C68FE6'};

// Periodicity: transactions may carry {freqUnit, freqN}. Absent (all pre-existing
// data) means one-time — never assume the fields exist.
const FREQ_UNITS = [
  {id:'once', label:'One-time'},
  {id:'day', label:'day(s)'},
  {id:'week', label:'week(s)'},
  {id:'month', label:'month(s)'},
  {id:'year', label:'year(s)'}
];
const MONTHLY_FACTOR = {day:365/12, week:52/12, month:1, year:1/12};

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n){
  const sign = n < 0 ? '-' : '';
  return sign + '$' + Math.abs(n).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function monthLabel(key){
  const [y,m] = key.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleString('en-US', {month:'long', year:'numeric'});
}
function shiftMonth(key, delta){
  const [y,m] = key.split('-').map(Number);
  const d = new Date(y, m-1+delta, 1);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function todayMonthKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}
function freqLabel(t){
  const u = t.freqUnit || 'once';
  if (u === 'once') return '';
  const n = t.freqN || 1;
  const short = {day:'day', week:'wk', month:'mo', year:'yr'}[u] || u;
  return n === 1 ? '/ ' + short : '/ ' + n + ' ' + short;
}
function monthlyEquivalent(t){
  const u = t.freqUnit || 'once';
  if (u === 'once' || !MONTHLY_FACTOR[u]) return 0;
  return t.amount * MONTHLY_FACTOR[u] / (t.freqN || 1);
}

let state = {
  month: todayMonthKey(),
  income: 0,
  transactions: [], // {id, date, amount, category, account, note, freqUnit?, freqN?}
  editingId: null
};
let loading = true;

async function loadMonth(monthKey){
  loading = true;
  state.editingId = null;
  render();
  try{
    const raw = localStorage.getItem('budget:' + monthKey);
    const val = raw ? JSON.parse(raw) : {income:0, transactions:[]};
    state.month = monthKey;
    state.income = val.income || 0;
    state.transactions = val.transactions || [];
  }catch(e){
    state.month = monthKey;
    state.income = 0;
    state.transactions = [];
  }
  loading = false;
  render();
}

async function saveMonth(){
  try{
    localStorage.setItem('budget:' + state.month, JSON.stringify({
      income: state.income,
      transactions: state.transactions
    }));
  }catch(e){
    console.error('Save failed', e);
    alert('Could not save — your browser storage may be full or blocked (private/incognito mode disables this).');
  }
}

function submitTransaction(e){
  e.preventDefault();
  const f = e.target;
  const date = f.date.value || new Date().toISOString().slice(0,10);
  const amount = parseFloat(f.amount.value);
  const category = f.category.value;
  const account = f.account.value.trim() || 'Unspecified';
  const note = f.note.value.trim();
  const freqUnit = FREQ_UNITS.some(u => u.id === f.freqUnit.value) ? f.freqUnit.value : 'once';
  const freqN = freqUnit === 'once' ? 1 : Math.max(1, Math.round(parseFloat(f.freqN.value) || 1));
  if(!amount || amount <= 0 || !note) return;
  if(state.editingId){
    const t = state.transactions.find(t => t.id === state.editingId);
    if(t) Object.assign(t, {date, amount, category, account, note, freqUnit, freqN});
    state.editingId = null;
  } else {
    state.transactions.push({
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      date, amount, category, account, note, freqUnit, freqN
    });
  }
  saveMonth();
  render();
}

function startEdit(id){
  state.editingId = id;
  render();
  const card = document.getElementById('formCard');
  if(card) card.scrollIntoView({behavior:'smooth', block:'start'});
}

function cancelEdit(){
  state.editingId = null;
  render();
}

function deleteTransaction(id){
  state.transactions = state.transactions.filter(t => t.id !== id);
  if(state.editingId === id) state.editingId = null;
  saveMonth();
  render();
}

function setIncome(val){
  const n = parseFloat(val);
  state.income = isNaN(n) ? 0 : n;
  saveMonth();
  render();
}

function changeMonth(delta){
  loadMonth(shiftMonth(state.month, delta));
}

// Every distinct account name across ALL saved months, most-used first,
// for the card/account suggestion dropdown.
function allAccounts(){
  const counts = {};
  for(let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if(!key.startsWith('budget:')) continue;
    try{
      const val = JSON.parse(localStorage.getItem(key));
      (val.transactions || []).forEach(t => {
        if(t.account && t.account !== 'Unspecified'){
          counts[t.account] = (counts[t.account] || 0) + 1;
        }
      });
    }catch(e){}
  }
  return Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
}

function setupAccountSuggest(form){
  const input = form.account;
  const menu = document.getElementById('acctMenu');
  if(!input || !menu) return;
  const show = () => {
    const q = input.value.trim().toLowerCase();
    const opts = allAccounts().filter(a => !q || a.toLowerCase().includes(q));
    if(!opts.length){ menu.classList.remove('open'); menu.innerHTML = ''; return; }
    menu.innerHTML = opts.map(a => `<div class="acct-item">${esc(a)}</div>`).join('');
    menu.classList.add('open');
    menu.querySelectorAll('.acct-item').forEach(el => {
      // pointerdown fires before the input's blur, so the tap lands reliably on iOS
      el.addEventListener('pointerdown', (ev) => {
        ev.preventDefault();
        input.value = el.textContent;
        menu.classList.remove('open');
      });
    });
  };
  input.addEventListener('focus', show);
  input.addEventListener('input', show);
  input.addEventListener('blur', () => setTimeout(() => menu.classList.remove('open'), 120));
}

function render(){
  const app = document.getElementById('app');

  const totals = {bills:0, subscriptions:0, essentials:0, discretionary:0};
  const byAccount = {};
  let recurringMonthly = 0, recurringCount = 0, oneTimeTotal = 0, oneTimeCount = 0;
  state.transactions.forEach(t => {
    totals[t.category] = (totals[t.category]||0) + t.amount;
    byAccount[t.account] = (byAccount[t.account]||0) + t.amount;
    const eq = monthlyEquivalent(t);
    if(eq > 0){ recurringMonthly += eq; recurringCount++; }
    else { oneTimeTotal += t.amount; oneTimeCount++; }
  });
  const totalSpent = Object.values(totals).reduce((a,b)=>a+b, 0);
  const leftover = state.income - totalSpent;

  const stackHtml = CATEGORIES.map(c => {
    const pct = totalSpent > 0 ? (totals[c.id]/totalSpent*100) : 0;
    return `<div style="width:${pct}%;background:${CAT_COLOR[c.id]}"></div>`;
  }).join('');

  const catListHtml = CATEGORIES.map(c => {
    const amt = totals[c.id] || 0;
    const pct = state.income > 0 ? (amt/state.income*100).toFixed(1) : '0.0';
    return `<div class="cat-row">
      <span class="cat-name"><span class="dot" style="background:${CAT_COLOR[c.id]}"></span>${c.label}</span>
      <span class="cat-val"><span class="cat-amt">${fmt(amt)}</span><span class="cat-pct">${pct}% of income</span></span>
    </div>`;
  }).join('');

  const sortedTx = [...state.transactions].sort((a,b) => b.date.localeCompare(a.date));
  const txRows = sortedTx.length ? sortedTx.map(t => {
    const cat = CATEGORIES.find(c => c.id === t.category);
    const fl = freqLabel(t);
    // Legacy entries logged before notes were required may have no note:
    // show the account as the headline and skip the account sub-line.
    const noteText = t.note || t.account;
    const acctText = t.note ? t.account : '';
    return `<div class="tx-row">
      <span class="tx-date">${esc(t.date)}</span>
      <span class="tx-cat"><span class="dot" style="background:${CAT_COLOR[t.category] || 'var(--muted)'}"></span>${cat ? cat.label : esc(t.category)}</span>
      <span class="tx-note">${esc(noteText)}</span>
      <span class="tx-acct">${esc(acctText)}</span>
      <span class="tx-amt">${fmt(t.amount)}${fl ? `<span class="tx-freq">${esc(fl)}</span>` : ''}</span>
      <span class="tx-actions">
        <button data-edit="${t.id}" title="Edit" aria-label="Edit transaction">&#9998;</button>
        <button data-del="${t.id}" title="Delete" aria-label="Delete transaction">&times;</button>
      </span>
    </div>`;
  }).join('') : `<div class="empty">No transactions logged for this month yet.</div>`;

  const accountRows = Object.keys(byAccount).length ? Object.entries(byAccount)
    .sort((a,b) => b[1]-a[1])
    .map(([acc, amt]) => `<div class="account-row"><span>${esc(acc)}</span><span>${fmt(amt)}</span></div>`)
    .join('') : `<div class="empty">No spending logged yet.</div>`;

  const et = state.editingId ? state.transactions.find(t => t.id === state.editingId) : null;
  const fv = {
    date: et ? et.date : new Date().toISOString().slice(0,10),
    amount: et ? et.amount : '',
    category: et ? et.category : CATEGORIES[0].id,
    account: et ? (et.account === 'Unspecified' ? '' : et.account) : '',
    note: et ? (et.note || '') : '',
    freqUnit: et ? (et.freqUnit || 'once') : 'once',
    freqN: et ? (et.freqN || 1) : 1
  };

  app.innerHTML = `
    <p class="eyebrow">Monthly Spending</p>
    <h1>Ledger</h1>

    <div class="month-row">
      <div class="month-nav">
        <button id="prevMonth" aria-label="Previous month">&larr;</button>
        <span class="month-label">${monthLabel(state.month)}</span>
        <button id="nextMonth" aria-label="Next month">&rarr;</button>
      </div>
      <div class="income-field">
        MONTHLY INCOME
        <input type="number" id="incomeInput" step="0.01" inputmode="decimal" value="${state.income || ''}" placeholder="0.00">
        <button id="exportBtn" title="Download backup">&darr;</button>
        <label class="import-label" title="Restore backup">&uarr;<input type="file" id="importInput" accept="application/json" style="display:none"></label>
      </div>
    </div>

    <div class="hero">
      <div class="hero-label">Left over this month</div>
      <div class="hero-amount ${leftover >= 0 ? 'pos' : 'neg'}">${fmt(leftover)}</div>
      <div class="equation">
        <span class="num">${fmt(state.income)}</span>
        <span class="op">income &minus;</span>
        <span class="num">${fmt(totalSpent)}</span>
        <span class="op">spent =</span>
        <span class="num">${fmt(leftover)}</span>
        <span class="op">disposable</span>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat">
        <div class="hero-label">Recurring / month</div>
        <div class="stat-amount">${fmt(recurringMonthly)}</div>
        <div class="stat-sub">${recurringCount} recurring, normalized to monthly</div>
      </div>
      <div class="stat">
        <div class="hero-label">One-time this month</div>
        <div class="stat-amount">${fmt(oneTimeTotal)}</div>
        <div class="stat-sub">${oneTimeCount} one-time transaction${oneTimeCount === 1 ? '' : 's'}</div>
      </div>
    </div>

    <div class="bars-card">
      <div class="bars-title">Spending Breakdown</div>
      <div class="stack">${totalSpent > 0 ? stackHtml : '<div style="width:100%;background:var(--surface-2)"></div>'}</div>
      <div class="cat-list">${catListHtml}</div>
    </div>

    <div class="form-card" id="formCard">
      <div class="form-title">${et ? 'Edit Transaction' : 'Log a Transaction'}</div>
      <form id="txForm" autocomplete="off">
        <div class="field">
          <label>Date</label>
          <input type="date" name="date" value="${esc(fv.date)}">
        </div>
        <div class="field">
          <label>Amount</label>
          <input type="number" name="amount" step="0.01" min="0" inputmode="decimal" placeholder="0.00" required value="${fv.amount}">
        </div>
        <div class="field">
          <label>Category</label>
          <select name="category">
            ${CATEGORIES.map(c => `<option value="${c.id}"${c.id === fv.category ? ' selected' : ''}>${c.label}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>Repeats every</label>
          <div class="freq-wrap">
            <input type="number" name="freqN" min="1" step="1" inputmode="numeric" value="${fv.freqN}"${fv.freqUnit === 'once' ? ' style="display:none"' : ''}>
            <select name="freqUnit">
              ${FREQ_UNITS.map(u => `<option value="${u.id}"${u.id === fv.freqUnit ? ' selected' : ''}>${u.label}</option>`).join('')}
            </select>
          </div>
        </div>
        <div class="field span2">
          <label>Card / account</label>
          <input type="text" name="account" placeholder="e.g. Example Card" value="${esc(fv.account)}">
          <div class="acct-menu" id="acctMenu"></div>
        </div>
        <div class="field span2">
          <label>Note</label>
          <input type="text" name="note" placeholder="What was it? e.g. Rent" required value="${esc(fv.note)}">
        </div>
        <div class="form-actions">
          ${et ? '<button type="button" class="ghost" id="cancelEditBtn">Cancel</button>' : ''}
          <button type="submit">${et ? 'Save changes' : 'Add'}</button>
        </div>
      </form>
    </div>

    <div class="table-card">
      <div class="bars-title">Transactions</div>
      <div class="tx-head"><span>Date</span><span>Category</span><span>Note</span><span>Account</span><span class="r">Amount</span><span></span></div>
      ${txRows}
    </div>

    <div class="account-card">
      <div class="bars-title">By Card / Account</div>
      ${accountRows}
    </div>
  `;

  document.getElementById('prevMonth').onclick = () => changeMonth(-1);
  document.getElementById('nextMonth').onclick = () => changeMonth(1);
  document.getElementById('incomeInput').onchange = (e) => setIncome(e.target.value);
  const form = document.getElementById('txForm');
  form.onsubmit = submitTransaction;
  form.freqUnit.onchange = () => {
    form.freqN.style.display = form.freqUnit.value === 'once' ? 'none' : '';
  };
  setupAccountSuggest(form);
  const cancelBtn = document.getElementById('cancelEditBtn');
  if(cancelBtn) cancelBtn.onclick = cancelEdit;
  document.getElementById('exportBtn').onclick = exportAllData;
  document.getElementById('importInput').onchange = (e) => {
    if (e.target.files[0]) importAllData(e.target.files[0]);
  };
  app.querySelectorAll('[data-edit]').forEach(btn => {
    btn.onclick = () => startEdit(btn.getAttribute('data-edit'));
  });
  app.querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = () => deleteTransaction(btn.getAttribute('data-del'));
  });
}

loadMonth(state.month);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

// Tiny IndexedDB key-value store, only used to remember the backup file handle
// (file handles can't go in localStorage).
function idb(){
  return new Promise((res, rej) => {
    const r = indexedDB.open('ledger-meta', 1);
    r.onupgradeneeded = () => r.result.createObjectStore('kv');
    r.onsuccess = () => res(r.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbGet(key){
  try{
    const db = await idb();
    return await new Promise((res) => {
      const t = db.transaction('kv').objectStore('kv').get(key);
      t.onsuccess = () => res(t.result);
      t.onerror = () => res(undefined);
    });
  }catch(e){ return undefined; }
}
async function idbSet(key, val){
  try{
    const db = await idb();
    await new Promise((res) => {
      const t = db.transaction('kv', 'readwrite');
      t.objectStore('kv').put(val, key);
      t.oncomplete = res;
      t.onerror = res;
    });
  }catch(e){}
}

function flashExportBtn(){
  const btn = document.getElementById('exportBtn');
  if(!btn) return;
  btn.innerHTML = '&check;';
  setTimeout(() => { btn.innerHTML = '&darr;'; }, 1200);
}

async function exportAllData(){
  const all = {};
  for (let i = 0; i < localStorage.length; i++){
    const key = localStorage.key(i);
    if (key.startsWith('budget:')) all[key] = JSON.parse(localStorage.getItem(key));
  }
  const json = JSON.stringify(all, null, 2);

  // Where the browser allows it (desktop Chrome/Edge), write over the same
  // ledger-backup.json every time instead of piling up copies. After the first
  // save the remembered handle makes it a silent one-tap overwrite.
  if (window.showSaveFilePicker){
    try{
      let handle = await idbGet('backupHandle');
      if (handle && await handle.queryPermission({mode:'readwrite'}) !== 'granted'
                 && await handle.requestPermission({mode:'readwrite'}) !== 'granted'){
        handle = null;
      }
      if (!handle){
        handle = await window.showSaveFilePicker({
          suggestedName: 'ledger-backup.json',
          types: [{description:'Ledger backup (JSON)', accept:{'application/json':['.json']}}]
        });
        await idbSet('backupHandle', handle);
      }
      const w = await handle.createWritable();
      await w.write(json);
      await w.close();
      flashExportBtn();
      return;
    }catch(e){
      if (e.name === 'AbortError') return; // user cancelled the save dialog
      await idbSet('backupHandle', undefined); // stale handle — fall back this time
    }
  }

  // Fallback (iOS/Safari/Firefox): plain download under one fixed name, so
  // backups collide by name instead of accumulating as dated files.
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ledger-backup.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importAllData(file){
  const reader = new FileReader();
  reader.onload = (e) => {
    try{
      const all = JSON.parse(e.target.result);
      Object.entries(all).forEach(([key, val]) => {
        if (key.startsWith('budget:')) localStorage.setItem(key, JSON.stringify(val));
      });
      loadMonth(state.month);
      alert('Backup restored.');
    }catch(err){
      alert('Could not read that file — make sure it\'s a Ledger backup JSON.');
    }
  };
  reader.readAsText(file);
}
</script>
